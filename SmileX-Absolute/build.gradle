buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // ใช้ Gradle Plugin ที่เสถียรสำหรับโปรเจกต์แนวนี้
        classpath 'com.android.tools.build:gradle:4.2.2'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.application'

android {
    // อัปเกรดเพื่อให้ทำงานบน Android รุ่นใหม่ๆ ได้ดีขึ้น
    compileSdkVersion 34
    buildToolsVersion "30.0.3"
    
    ndkVersion "21.4.7075529"

    defaultConfig {
        applicationId "com.smilex.absolute"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0-Absolute"
        
        // ช่วยให้รันแอปที่มี Library เยอะๆ ได้โดยไม่หลุด
        multiDexEnabled true

        externalNativeBuild {
            ndkBuild {
                // คัดเอาเฉพาะ ABI ที่มือถือไทยปี 2026 ใช้จริง (32-bit และ 64-bit)
                abiFilters "armeabi-v7a", "arm64-v8a"
            }
        }
    }

    // ระบบจัดการไฟล์ Library เพื่อให้ Android หา "ดาบมรกต" เจอแน่นอน
    packagingOptions {
        doNotStrip "*/armeabi-v7a/*.so"
        doNotStrip "*/arm64-v8a/*.so"
        pickFirst "lib/arm64-v8a/libsmilex.so"
        pickFirst "lib/armeabi-v7a/libsmilex.so"
    }

    // ปรับจูนหน่วยความจำให้แอปมีพื้นที่รัน Script เยอะขึ้น
    dexOptions {
        javaMaxHeapSize "2g"
        preDexLibraries true
    }

    sourceSets {
        main {
            java.srcDirs = ['app']
            res.srcDirs = ['res']
            jniLibs.srcDirs = ['libs'] 
            manifest.srcFile 'AndroidManifest.xml'
        }
    }

    externalNativeBuild {
        ndkBuild {
            // ชี้พิกัดไปที่ไฟล์ตีดาบหลัก
            path = file("jni/Android.mk")
        }
    }
    
    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
