buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // หัวใจสำคัญ: บอกให้ Gradle รู้จักเครื่องมือสร้าง Android
        classpath 'com.android.tools.build:gradle:4.2.2'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.application'

android {
    compileSdkVersion 30
    
    defaultConfig {
        applicationId "com.smilex.absolute"
        minSdkVersion 21
        targetSdkVersion 30
        versionCode 1
        versionName "1.0-Absolute"
        
        // สั่งให้คอมไพล์ JNI (core.cpp)
        externalNativeBuild {
            ndkBuild {
                path "jni/Android.mk"
            }
        }
    }
    
    sourceSets {
        main {
            java.srcDirs = ['app'] // ไฟล์ Java อยู่ในโฟลเดอร์ app
            manifest.srcFile 'AndroidManifest.xml'
        }
    }

    externalNativeBuild {
        ndkBuild {
            path "jni/Android.mk"
        }
    }
}
