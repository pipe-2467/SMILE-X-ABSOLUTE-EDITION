buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:4.2.2'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.application'

android {
    compileSdkVersion 30
    
    defaultConfig {
        applicationId "com.smilex.absolute"
        minSdkVersion 21
        targetSdkVersion 30
        versionCode 1
        versionName "1.0-Absolute"
        
        // ส่วนที่ 1: การตั้งค่าคอมไพล์สำหรับ defaultConfig
        externalNativeBuild {
            ndkBuild {
                // สำหรับในนี้ ใช้คำสั่ง arguments หรือ abiFilters ได้ (ถ้ามี)
            }
        }
    }
    
    sourceSets {
        main {
            java.srcDirs = ['app']
            manifest.srcFile 'AndroidManifest.xml'
        }
    }

    // ส่วนที่ 2: การระบุตำแหน่งไฟล์ Android.mk (จุดที่พังเมื่อกี้)
    externalNativeBuild {
        ndkBuild {
            path file("jni/Android.mk") // ใช้คำว่า file เพื่อระบุตำแหน่งให้ชัดเจน
        }
    }
}
