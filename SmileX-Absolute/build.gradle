apply plugin: 'com.android.application'

android {
    compileSdkVersion 30
    defaultConfig {
        applicationId "com.smilex.absolute"
        minSdkVersion 21
        targetSdkVersion 30
        versionCode 1
        versionName "1.0-Absolute"
        
        // สั่งให้คอมไพล์ JNI (core.cpp)
        externalNativeBuild {
            ndkBuild {
                path "jni/Android.mk"
            }
        }
    }
    
    sourceSets {
        main {
            java.srcDirs = ['app'] // บอกว่าไฟล์ Java อยู่ในโฟลเดอร์ app
            manifest.srcFile 'AndroidManifest.xml'
        }
    }

    externalNativeBuild {
        ndkBuild {
            path "jni/Android.mk"
        }
    }
}
