buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:4.2.2'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: 'com.android.application'

android {
    compileSdkVersion 30
    ndkVersion "21.4.7075529"

    defaultConfig {
        applicationId "com.smilex.absolute"
        minSdkVersion 21
        targetSdkVersion 30
        versionCode 1
        versionName "1.0-Absolute"
        
        externalNativeBuild {
            ndkBuild {
                abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
            }
        }
    }

    // จุดสำคัญ: บอก Gradle ว่าไฟล์อยู่ที่ไหนบ้าง
    sourceSets {
        main {
            java.srcDirs = ['app']
            res.srcDirs = ['res']
            manifest.srcFile 'AndroidManifest.xml'
        }
    }

    externalNativeBuild {
        ndkBuild {
            path = file("jni/Android.mk")
        }
    }
    
    lintOptions {
        abortOnError false
    }
}
