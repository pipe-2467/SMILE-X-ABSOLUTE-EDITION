name: Smile-X APK Builder
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # เพิ่มระบบ Cache เพื่อให้รันครั้งต่อไปเร็วขึ้น (กราฟจะสวยขึ้น)
          cache: 'gradle'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          # ระบุเวอร์ชัน NDK ที่ลูกพี่ต้องการตรงนี้เลย
          ndk-version: '21.4.7075529'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build APK with Gradle
        # ใช้ GRADLE_OPTS เพื่อแก้ปัญหา Java 17 กับ Gradle รุ่นเก่า
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs='--add-opens java.base/java.io=ALL-UNNAMED --add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED'"
        run: ./gradlew :SmileX-Absolute:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smile-X-Absolute-Build
          path: "app/build/outputs/apk/debug/*.apk"
