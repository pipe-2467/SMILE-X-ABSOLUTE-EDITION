name: Smile-X APK Builder
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: nttld/setup-android@v3 # ใช้ตัว Setup ที่ครอบคลุมกว่า

      - name: Build APK
        run: |
          # เข้าไปในโฟลเดอร์ที่มีไฟล์โปรเจกต์จริงๆ
          cd SMILE-X-ABSOLUTE-EDITION-main/SmileX-Absolute
          chmod +x gradlew
          ./gradlew assembleDebug
