name: Smile-X APK Builder

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '21.4.7075529'

      # --- เปลี่ยนมาใช้ Action ตัวใหม่ล่าสุดตามคำแนะนำของ GitHub ---
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.5

      - name: Build APK
        working-directory: ./SmileX-Absolute
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs='--add-opens java.base/java.io=ALL-UNNAMED --add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED'"
        run: |
          # ไม่ใช้ ./gradlew แล้ว แต่จะใช้คำสั่ง gradle ตรงๆ ของระบบ
          # และใส่ --stacktrace เพื่อให้เห็น Error ชัดๆ ถ้ามันพังอีก
          gradle :app:assembleDebug --no-daemon --stacktrace || gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smile-X-Absolute-Build
          path: "**/build/outputs/apk/debug/*.apk"
