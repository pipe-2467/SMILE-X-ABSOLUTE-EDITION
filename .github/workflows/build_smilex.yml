name: Smile-X APK Builder
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21d

      - name: Auto-Generate Wrapper and Build
        run: |
          # หาจุดที่มีไฟล์ build.gradle
          PROJECT_ROOT=$(find . -name build.gradle -exec dirname {} \;)
          cd "$PROJECT_ROOT"
          
          echo "Building in: $PROJECT_ROOT"
          
          # ติดตั้ง gradle ลงในเครื่อง GitHub ชั่วคราวเพื่อสร้าง Wrapper
          sudo apt-get update && sudo apt-get install gradle -y
          
          # สร้างไฟล์ที่หายไป (gradlew และ jar)
          gradle wrapper
          
          # เริ่ม Build APK
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smile-X-Absolute-Build
          path: "**/build/outputs/apk/debug/*.apk"
