name: Smile-X APK Builder
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # อัปเดตเป็น v4 แก้เรื่อง Node.js

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21d

      - name: Initialize Gradle
        run: |
          cd SMILE-X-ABSOLUTE-EDITION-main/SmileX-Absolute
          # สั่งสร้างไฟล์ gradlew ใหม่ขึ้นมาเองเลยถ้ามันหาไม่เจอ
          gradle wrapper 

      - name: Build APK
        run: |
          cd SMILE-X-ABSOLUTE-EDITION-main/SmileX-Absolute
          chmod +x gradlew
          ./gradlew assembleDebug
