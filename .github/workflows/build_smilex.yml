name: Smile-X APK Builder

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: '21.4.7075529'

      # --- STEP แก้ปัญหาเรื่องเวอร์ชัน Gradle ---
      - name: Setup Gradle 7.5
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 7.5

      - name: Repair and Build
        working-directory: ./SmileX-Absolute
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs='--add-opens java.base/java.io=ALL-UNNAMED --add-opens java.base/java.lang=ALL-UNNAMED --add-opens java.base/java.util=ALL-UNNAMED'"
        run: |
          # สร้าง wrapper ใหม่ด้วยเวอร์ชัน 7.5 ที่โหลดมาเมื่อกี้
          gradle wrapper
          chmod +x gradlew
          # เริ่ม Build ทันที
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smile-X-Absolute-Build
          path: "**/build/outputs/apk/debug/*.apk"
