name: Smile-X Manual Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21d

      - name: Compile Native C++ (jni)
        run: |
          cd SMILE-X-ABSOLUTE-EDITION-main/SmileX-Absolute/jni
          ndk-build
          # ถ้าผ่าน ขั้นตอนนี้จะได้ไฟล์ .so ออกมา

      - name: Compile Java Classes
        run: |
          cd SMILE-X-ABSOLUTE-EDITION-main/SmileX-Absolute/app
          # รวบรวมไฟล์ Java ทั้งหมดมาคอมไพล์
          javac -d . *.java
          
      - name: Build Status
        run: echo "ถ้ามาถึงจุดนี้ได้ แสดงว่าโค้ดของ Pipe ไม่มี Error แล้ว!"
