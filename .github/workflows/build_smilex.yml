name: Smile-X APK Builder
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          # 1. ยอมรับ License แบบเงียบที่สุด (แก้ปัญหา Broken pipe)
          mkdir -p "$ANDROID_SDK_ROOT/licenses"
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7430130233f9967321\n24333f8a63b6825ea9c5573f4353d75cbb0ad30a" > "$ANDROID_SDK_ROOT/licenses/android-sdk-license"
          
          # 2. สร้าง Gradle Wrapper ไว้ที่หน้าแรกสุดของ Repository
          gradle wrapper --gradle-version 7.5
          chmod +x gradlew
          
          # 3. รัน Build โดยชี้ไปที่ Project ที่ระบุใน settings.gradle
          # ใช้คำสั่งชี้ตรงไปที่ Module ที่หัวหน้าตั้งชื่อไว้
          ./gradlew :SmileX-Absolute:assembleDebug --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smile-X-Absolute-Build
          path: "**/build/outputs/apk/debug/*.apk"
