name: Smile-X APK Builder
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          # 1. จัดการ License ให้ครอบคลุมถึง NDK (เพิ่มรหัส License ตัวที่ขาดไป)
          mkdir -p "$ANDROID_SDK_ROOT/licenses"
          echo -e "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb7430130233f9967321\n24333f8a63b6825ea9c5573f4353d75cbb0ad30a\n84831b9409646a918e30573bab4c9c91346d8abd\n5046632292f0b5707351fd997b420c9517135838" > "$ANDROID_SDK_ROOT/licenses/android-sdk-license"
          
          # 2. บังคับยอมรับ License ทั้งหมดผ่าน sdkmanager อีกชั้น (แบบเงียบๆ)
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

          # 3. ตรวจสอบและดาวน์โหลด Gradle 7.5 (ล็อคเวอร์ชันป้องกันบัค 9.4.1)
          if [ ! -d "gradle-7.5" ]; then
            wget -q https://services.gradle.org/distributions/gradle-7.5-bin.zip
            unzip -q gradle-7.5-bin.zip
          fi

          # 4. รัน Build โดยชี้เป้าไปที่ Module ของหัวหน้า
          # เพิ่ม --no-daemon เพื่อลดการใช้ RAM และป้องกัน Broken pipe
          ./gradle-7.5/bin/gradle :SmileX-Absolute:assembleDebug --no-daemon --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smile-X-Absolute-Build
          path: "**/build/outputs/apk/debug/*.apk"
