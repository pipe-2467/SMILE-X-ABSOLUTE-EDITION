name: Smile-X APK Builder
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 7.5 # บังคับใช้เวอร์ชันนี้ เพื่อให้เจอ Android Plugin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          # สั่งให้ระบบยอมรับสัญญาการใช้งาน SDK ทั้งหมดก่อนรัน
          yes | sdkmanager --licenses || true
          
          # ใช้คำสั่ง build โดยรัน gradle จากรูทโดยระบุ subproject
          gradle :SmileX-Absolute:assembleDebug --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Smile-X-Absolute-Build
          path: "**/build/outputs/apk/debug/*.apk"